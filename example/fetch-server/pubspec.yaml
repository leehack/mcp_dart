name: fetch_server
description: A stdio-based MCP server for fetching website content.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  mcp_dart:
    path: ../../
  http: ^1.0.0

dev_dependencies:
  # Dart 3.5 resolves lints 5.0; Dart 3.8+ can use the latest lints 6 release.
  lints: ">=5.0.0 <7.0.0"
  test: ^1.25.15
