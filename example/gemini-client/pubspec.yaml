name: gemini_client
description: A Gemini Interactions API client that connects to MCP servers.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.7.2

dependencies:
  http: ^1.4.0
  mcp_dart:
    path: ../..

dev_dependencies:
  # Dart 3.7 resolves lints 5.1; Dart 3.8+ can use the latest lints 6 release.
  lints: ">=5.1.1 <7.0.0"
  test: ^1.24.0
