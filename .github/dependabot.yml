version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: pub
    directories:
      - /
      - /packages/mcp_dart_cli
      - /packages/mcp_dart_cli/test/fixtures/dart_mcp_project
      - /example/anthropic-client
      - /example/fetch-server
      - /example/flutter_http_client
      - /example/gemini-client
      - /example/jaspr-client
    schedule:
      interval: weekly
    groups:
      pub-dependencies:
        group-by: dependency-name

  - package-ecosystem: npm
    directories:
      - /test/interop/ts
      - /test/interop/ts_2026_07_28
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        group-by: dependency-name
    ignore:
      # Keep compile-time Node APIs aligned with the Node 24 CI baseline.
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
      # Remove once typescript-eslint officially supports TypeScript 7.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major

  - package-ecosystem: pip
    directories:
      - /test/interop/python
      - /test/interop/python_2026_07_28
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        group-by: dependency-name
