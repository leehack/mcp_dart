name: Run MCP 2026-07-28 Interop

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/conformance/**'
      - 'test/interop/test_dart_server.dart'
      - 'test/interop/ts_2026_07_28/**'
      - 'test/interop/python_2026_07_28/**'
      - 'test/browser/mcp_2026_07_28_streamable_http_test.dart'
      - 'tool/testing/run_ts_2026_07_28_interop.dart'
      - 'tool/testing/run_python_2026_07_28_interop.dart'
      - 'tool/testing/run_browser_2026_07_28_interop.dart'
      - 'tool/testing/bounded_response_body.dart'
      - 'tool/testing/mcp_2026_07_28_discovery_wire_probe.dart'
      - '.github/workflows/interop_2026_07_28.yml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    paths:
      - 'lib/**'
      - 'test/conformance/**'
      - 'test/interop/test_dart_server.dart'
      - 'test/interop/ts_2026_07_28/**'
      - 'test/interop/python_2026_07_28/**'
      - 'test/browser/mcp_2026_07_28_streamable_http_test.dart'
      - 'tool/testing/run_ts_2026_07_28_interop.dart'
      - 'tool/testing/run_python_2026_07_28_interop.dart'
      - 'tool/testing/run_browser_2026_07_28_interop.dart'
      - 'tool/testing/bounded_response_body.dart'
      - 'tool/testing/mcp_2026_07_28_discovery_wire_probe.dart'
      - '.github/workflows/interop_2026_07_28.yml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
jobs:
  ts-2026-07-28-interop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install Dart dependencies
        run: dart pub get

      - name: Install TypeScript 2026-07-28 fixture dependencies
        working-directory: test/interop/ts_2026_07_28
        run: npm ci

      - name: Run Dart client against published TypeScript beta server
        run: >-
          dart run tool/testing/run_ts_2026_07_28_interop.dart
          --direction=dart-to-ts

      - name: Verify known published TypeScript beta client gap
        run: >-
          dart run tool/testing/run_ts_2026_07_28_interop.dart
          --direction=ts-to-dart
          --expect-published-ts-client-gap

  python-2026-07-28-interop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.13'

      - name: Install Dart dependencies
        run: dart pub get

      - name: Install Python 2026-07-28 fixture dependencies
        run: >-
          python -m pip install
          -r test/interop/python_2026_07_28/requirements.txt

      - name: Run Dart client against published Python beta server
        env:
          MCP_PYTHON: python
        run: >-
          dart run tool/testing/run_python_2026_07_28_interop.dart
          --direction=dart-to-python

      - name: Verify known published Python beta client gap
        env:
          MCP_PYTHON: python
        run: >-
          dart run tool/testing/run_python_2026_07_28_interop.dart
          --direction=python-to-dart
          --expect-published-python-client-gap

  browser-2026-07-28-interop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install Dart dependencies
        run: dart pub get

      - name: Run browser 2026-07-28 interop fixture
        run: dart run tool/testing/run_browser_2026_07_28_interop.dart
