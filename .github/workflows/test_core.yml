name: Run Core Tests on PR

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  minimum-sdk:
    name: minimum SDK (Dart 3.4.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up minimum supported Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.4.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install TS interop dependencies
        working-directory: test/interop/ts
        run: npm ci

      - name: Build TS interop fixtures
        working-directory: test/interop/ts
        run: npm run build

      - name: Install dependencies
        run: dart pub get

      - name: Analyze SDK sources
        run: dart analyze lib

      - name: Run minimum-SDK test suite
        run: dart test

  api-compatibility:
    name: public API compatibility (mcp_dart 2.2.2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install API compatibility checker
        run: dart pub global activate dart_apitool 0.23.1

      - name: Compare public API with mcp_dart 2.2.2
        run: |
          mkdir -p "$RUNNER_TEMP/mcp_dart_api"
          git archive HEAD lib pubspec.yaml analysis_options.yaml |
            tar -x -C "$RUNNER_TEMP/mcp_dart_api"
          set +e
          dart-apitool diff \
            --old pub://mcp_dart/2.2.2 \
            --new "$RUNNER_TEMP/mcp_dart_api" \
            --version-check-mode onlyBreakingChanges \
            --ignore-prerelease \
            --no-analyze-platform-constraints \
            --report-format json \
            --report-file-path "$RUNNER_TEMP/mcp_dart_api_report.json"
          API_TOOL_STATUS=$?
          set -e

          if [ ! -s "$RUNNER_TEMP/mcp_dart_api_report.json" ]; then
            echo "dart_apitool failed without producing an API report."
            exit "$API_TOOL_STATUS"
          fi

          # dart_apitool 0.23.1 misclassifies these four newly added optional
          # static-factory parameters as required. Allow only that exact set;
          # compile fixtures cover the corresponding public call shapes.
          if ! jq -e '
            def changes($path):
              if type == "object" and has("changeDescription") then
                [{
                  path: ($path | join(" > ")),
                  code: .changeCode,
                  description: .changeDescription
                }]
              elif type == "object" and has("children") then
                . as $node
                | [.children[] | changes($path + [($node.label // "")])]
                | add
              else
                []
              end;
            (.report.breakingChanges | changes([]) | sort_by(.path)) as $actual
            | ($actual | length == 0)
              or $actual == [
                {
                  path: "BREAKING CHANGES > Class JsonSchema > Method boolean",
                  code: "CE02",
                  description: "Parameter \"mcpHeader\" added (required)"
                },
                {
                  path: "BREAKING CHANGES > Class JsonSchema > Method integer",
                  code: "CE02",
                  description: "Parameter \"mcpHeader\" added (required)"
                },
                {
                  path: "BREAKING CHANGES > Class JsonSchema > Method number",
                  code: "CE02",
                  description: "Parameter \"mcpHeader\" added (required)"
                },
                {
                  path: "BREAKING CHANGES > Class JsonSchema > Method string",
                  code: "CE02",
                  description: "Parameter \"mcpHeader\" added (required)"
                }
              ]
          ' "$RUNNER_TEMP/mcp_dart_api_report.json"; then
            jq '.report.breakingChanges' \
              "$RUNNER_TEMP/mcp_dart_api_report.json"
            exit 1
          fi

          if [ "$API_TOOL_STATUS" -ne 0 ] &&
            jq -e '
              (.report.breakingChanges.children // []) | length == 0
            ' "$RUNNER_TEMP/mcp_dart_api_report.json" >/dev/null; then
            echo "dart_apitool failed despite reporting no breaking changes."
            exit "$API_TOOL_STATUS"
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install TS Interop dependencies
        working-directory: test/interop/ts
        run: npm ci

      - name: Build TS Interop fixtures
        working-directory: test/interop/ts
        run: npm run build

      - name: Install dependencies
        run: dart pub get

      - name: Install CLI dependencies
        working-directory: packages/mcp_dart_cli
        run: dart pub get

      - name: Check out pinned MCP 2026-07-28 specification source
        run: |
          SPEC_REF="$(tr -d '[:space:]' < tool/testing/mcp_2026_07_28_spec_ref.txt)"
          git clone --filter=blob:none --no-checkout https://github.com/modelcontextprotocol/modelcontextprotocol.git .dart_tool/mcp-spec
          git -C .dart_tool/mcp-spec fetch --depth=1 origin "$SPEC_REF"
          git -C .dart_tool/mcp-spec checkout --detach FETCH_HEAD

      - name: Audit pinned MCP 2026-07-28 specification examples
        run: >
          dart run tool/spec_example_audit.dart
          .dart_tool/mcp-spec/schema/draft/examples

      - name: Audit pinned MCP 2026-07-28 specification document inventory
        run: >
          dart run tool/spec_document_inventory_audit.dart
          .dart_tool/mcp-spec/docs/specification/draft

      - name: Check out pinned JSON Schema Test Suite
        run: |
          SUITE_REF="$(tr -d '[:space:]' < tool/testing/json_schema_test_suite_ref.txt)"
          git clone --filter=blob:none --no-checkout https://github.com/json-schema-org/JSON-Schema-Test-Suite.git .dart_tool/json-schema-test-suite
          git -C .dart_tool/json-schema-test-suite fetch --depth=1 origin "$SUITE_REF"
          git -C .dart_tool/json-schema-test-suite checkout --detach FETCH_HEAD

      - name: Run official JSON Schema 2020-12 test suite
        run: >
          dart run tool/testing/run_json_schema_2020_12_suite.dart
          .dart_tool/json-schema-test-suite/tests/draft2020-12

      - name: Run official JSON Schema Draft 7 compatibility suite
        run: >
          dart run tool/testing/run_json_schema_draft7_suite.dart
          .dart_tool/json-schema-test-suite/tests/draft7

      - name: Run MCP spec conformance gate
        working-directory: packages/mcp_dart_cli
        run: dart run bin/mcp_dart.dart conformance --suite all --json

      - name: Run official MCP 2025-11-25 server conformance
        run: >
          dart run test/conformance/run_2025_server_conformance.dart
          --timeout-seconds 90
          --isolate-scenarios
          --output-dir .dart_tool/conformance/ci_2025_server

      - name: Run official MCP 2025-11-25 client conformance
        run: >
          npx -y @modelcontextprotocol/conformance@0.2.0-alpha.9 client
          --command "dart run test/conformance/mcp_2026_07_28_client.dart"
          --suite all
          --spec-version 2025-11-25
          --verbose
          -o .dart_tool/conformance/ci_2025_client

      - name: Run official MCP 2026-07-28 server conformance
        run: >
          dart run test/conformance/run_2026_07_28_server_conformance.dart
          --timeout-seconds 90
          --output-dir .dart_tool/conformance/ci_2026_server

      - name: Run official MCP 2026-07-28 client conformance
        run: >
          dart run test/conformance/run_2026_07_28_client_conformance.dart
          --timeout-seconds 90
          --output-dir .dart_tool/conformance/ci_2026_client

      - name: Run interop test suite
        run: dart test -t interop

      - name: Running tests with coverage
        run: |
          dart pub global activate coverage 1.15.1
          dart pub global run coverage:test_with_coverage

      - name: Validate package for publishing
        run: dart pub publish --dry-run

      - name: Run pana (package analysis)
        run: |
          dart pub global activate pana 0.23.14
          dart pub global run pana --json --no-warning --exit-code-threshold 0 > pana_output.json
          # Filter out log lines and extract scores from the summary
          RESULT=$(cat pana_output.json | grep -v '^{"logName"')
          SCORE=$(echo "$RESULT" | grep -o '"grantedPoints": *[0-9]*' | tail -1 | grep -o '[0-9]*$')
          MAX_POINTS=$(echo "$RESULT" | grep -o '"maxPoints": *[0-9]*' | tail -1 | grep -o '[0-9]*$')
          echo "Pana score: $SCORE/$MAX_POINTS"
          if [ "$SCORE" != "160" ] || [ "$MAX_POINTS" != "160" ]; then
            echo "Error: Package score is $SCORE/$MAX_POINTS. Required: 160/160"
            echo ""
            echo "Detailed report:"
            dart pub global run pana --no-warning
            exit 1
          fi
          echo "✓ Package achieves perfect 160/160 score"

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  platform-smoke:
    name: platform-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Install CLI dependencies
        working-directory: packages/mcp_dart_cli
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Run platform test suite
        run: dart test --exclude-tags interop

  dart-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: example/anthropic-client
            entrypoint: bin/main.dart
          - path: example/gemini-client
            entrypoint: bin/main.dart
          - path: example/fetch-server
            entrypoint: bin/fetch_server.dart

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: dart pub get

      - name: Analyze
        working-directory: ${{ matrix.path }}
        run: dart analyze

      - name: Test
        working-directory: ${{ matrix.path }}
        run: dart test

      - name: Compile executable
        working-directory: ${{ matrix.path }}
        run: dart compile exe ${{ matrix.entrypoint }} -o .dart_tool/example-smoke

  jaspr-example:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: example/jaspr-client
        run: dart pub get

      - name: Analyze
        working-directory: example/jaspr-client
        run: dart analyze

      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli 0.23.2

      - name: Build production bundle
        working-directory: example/jaspr-client
        run: jaspr build

  flutter-example:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: example/flutter_http_client
        run: flutter pub get

      - name: Analyze
        working-directory: example/flutter_http_client
        run: flutter analyze

      - name: Test
        working-directory: example/flutter_http_client
        run: flutter test --exclude-tags browser-e2e

      - name: Run Flutter Web MCP service integration in real Chrome
        run: dart run tool/testing/run_flutter_web_example_e2e.dart

      - name: Build release web bundle
        working-directory: example/flutter_http_client
        run: flutter build web --release
