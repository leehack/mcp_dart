name: Run Core Tests on PR

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install TS Interop dependencies
        working-directory: test/interop/ts
        run: npm ci

      - name: Build TS Interop fixtures
        working-directory: test/interop/ts
        run: npm run build

      - name: Install dependencies
        run: dart pub get

      - name: Install CLI dependencies
        working-directory: packages/mcp_dart_cli
        run: dart pub get

      - name: Run MCP spec conformance gate
        working-directory: packages/mcp_dart_cli
        run: dart run bin/mcp_dart.dart conformance --suite all --json

      - name: Run official MCP 2025 server conformance
        run: >
          dart run test/conformance/run_2025_server_conformance.dart
          --timeout-seconds 90
          --output-dir .dart_tool/conformance/ci_2025_server

      - name: Run official MCP 2025 client conformance
        run: >
          npx -y @modelcontextprotocol/conformance@0.2.0-alpha.7 client
          --command "dart run test/conformance/mcp_2026_07_28_rc_client.dart"
          --suite all
          --spec-version 2025-11-25
          --verbose
          -o .dart_tool/conformance/ci_2025_client

      - name: Run official MCP 2026-07-28 RC server conformance
        run: >
          dart run test/conformance/run_2026_07_28_rc_server_conformance.dart
          --timeout-seconds 90
          --output-dir .dart_tool/conformance/ci_2026_server

      - name: Run official MCP 2026-07-28 RC client conformance
        run: >
          dart run test/conformance/run_2026_07_28_rc_client_conformance.dart
          --timeout-seconds 90
          --output-dir .dart_tool/conformance/ci_2026_client

      - name: Run interop test suite
        run: dart test -t interop

      - name: Running tests with coverage
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage

      - name: Validate package for publishing
        run: dart pub publish --dry-run

      - name: Run pana (package analysis)
        run: |
          dart pub global activate pana
          dart pub global run pana --json --no-warning --exit-code-threshold 0 > pana_output.json
          # Filter out log lines and extract scores from the summary
          RESULT=$(cat pana_output.json | grep -v '^{"logName"')
          SCORE=$(echo "$RESULT" | grep -o '"grantedPoints": *[0-9]*' | tail -1 | grep -o '[0-9]*$')
          MAX_POINTS=$(echo "$RESULT" | grep -o '"maxPoints": *[0-9]*' | tail -1 | grep -o '[0-9]*$')
          echo "Pana score: $SCORE/$MAX_POINTS"
          if [ "$SCORE" != "160" ] || [ "$MAX_POINTS" != "160" ]; then
            echo "Error: Package score is $SCORE/$MAX_POINTS. Required: 160/160"
            echo ""
            echo "Detailed report:"
            dart pub global run pana --no-warning
            exit 1
          fi
          echo "✓ Package achieves perfect 160/160 score"

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
