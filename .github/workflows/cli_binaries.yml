name: Build CLI Binaries

on:
  push:
    tags:
      - 'mcp_dart_cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'CLI release tag to attach assets to, for example mcp_dart_cli-v0.1.9'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: mcp_dart-linux-x64
          - os: macos-15-intel
            asset: mcp_dart-macos-x64
          - os: macos-14
            asset: mcp_dart-macos-arm64
          - os: windows-2025
            asset: mcp_dart-windows-x64.exe

    defaults:
      run:
        working-directory: packages/mcp_dart_cli

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify release tag checkout
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            mcp_dart_cli-v*) ;;
            *)
              echo "❌ Invalid CLI release tag: $RELEASE_TAG"
              exit 1
              ;;
          esac
          TAG_REF=$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG")
          if [ -z "$TAG_REF" ]; then
            echo "❌ Remote CLI release tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          if [ -z "$TAG_COMMIT" ] || [ "$(git rev-parse HEAD)" != "$TAG_COMMIT" ]; then
            echo "❌ Checkout does not match $RELEASE_TAG."
            exit 1
          fi
          PACKAGE_VERSION=$(sed -n 's/^version: //p' pubspec.yaml)
          EXPECTED_TAG="mcp_dart_cli-v$PACKAGE_VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "❌ Tag $RELEASE_TAG does not match CLI version $PACKAGE_VERSION."
            exit 1
          fi
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "✅ Building exact tag $RELEASE_TAG at $TAG_COMMIT."

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile executable
        shell: bash
        run: |
          mkdir -p dist
          dart compile exe bin/mcp_dart.dart -o "dist/${{ matrix.asset }}"

      - name: Smoke test executable
        shell: bash
        run: |
          BINARY_VERSION=$("./dist/${{ matrix.asset }}" --version | tr -d '\r\n')
          if [ "$BINARY_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Binary reports $BINARY_VERSION, expected $PACKAGE_VERSION."
            exit 1
          fi
          echo "✅ Binary reports version $BINARY_VERSION."

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: packages/mcp_dart_cli/dist/${{ matrix.asset }}
          if-no-files-found: error

  release-assets:
    name: Attach binaries to release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify release tag checkout
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            mcp_dart_cli-v*) ;;
            *)
              echo "❌ Invalid CLI release tag: $RELEASE_TAG"
              exit 1
              ;;
          esac
          TAG_REF=$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG")
          if [ -z "$TAG_REF" ]; then
            echo "❌ Remote CLI release tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          if [ -z "$TAG_COMMIT" ] || [ "$(git rev-parse HEAD)" != "$TAG_COMMIT" ]; then
            echo "❌ Checkout does not match $RELEASE_TAG."
            exit 1
          fi
          PACKAGE_VERSION=$(sed -n 's/^version: //p' packages/mcp_dart_cli/pubspec.yaml)
          EXPECTED_TAG="mcp_dart_cli-v$PACKAGE_VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "❌ Tag $RELEASE_TAG does not match CLI version $PACKAGE_VERSION."
            exit 1
          fi
          echo "✅ Attaching assets built from $RELEASE_TAG at $TAG_COMMIT."

      - name: Download binary artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Add bundled skill asset
        run: |
          cp packages/mcp_dart_cli/lib/src/skills/mcp-developer/SKILL.md dist/mcp-developer.SKILL.md

      - name: Attach binaries
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          fail_on_unmatched_files: true
