name: Build CLI Binaries

on:
  push:
    tags:
      - 'mcp_dart_cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'CLI release tag to attach assets to, for example mcp_dart_cli-v0.1.9'
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: mcp_dart-linux-x64
          - os: macos-15-intel
            asset: mcp_dart-macos-x64
          - os: macos-15
            asset: mcp_dart-macos-arm64
          - os: windows-2025
            asset: mcp_dart-windows-x64.exe

    defaults:
      run:
        working-directory: packages/mcp_dart_cli

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify release tag checkout
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            mcp_dart_cli-v*) ;;
            *)
              echo "❌ Invalid CLI release tag: $RELEASE_TAG"
              exit 1
              ;;
          esac
          TAG_REF=$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG")
          if [ -z "$TAG_REF" ]; then
            echo "❌ Remote CLI release tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          if [ -z "$TAG_COMMIT" ] || [ "$(git rev-parse HEAD)" != "$TAG_COMMIT" ]; then
            echo "❌ Checkout does not match $RELEASE_TAG."
            exit 1
          fi
          PACKAGE_VERSION=$(sed -n 's/^version: //p' pubspec.yaml)
          EXPECTED_TAG="mcp_dart_cli-v$PACKAGE_VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "❌ Tag $RELEASE_TAG does not match CLI version $PACKAGE_VERSION."
            exit 1
          fi
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "✅ Building exact tag $RELEASE_TAG at $TAG_COMMIT."

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Resolve minimum hosted SDK dependency
        shell: bash
        run: |
          rm -f pubspec_overrides.yaml
          bash "$GITHUB_WORKSPACE/tool/release/verify_cli_published_sdk.sh" \
            --resolution-only

      - name: Compile executable
        shell: bash
        run: |
          mkdir -p dist
          dart compile exe bin/mcp_dart.dart -o "dist/${{ matrix.asset }}"

      - name: Smoke test executable
        shell: bash
        run: |
          BINARY_VERSION=$("./dist/${{ matrix.asset }}" --version | tr -d '\r\n')
          if [ "$BINARY_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Binary reports $BINARY_VERSION, expected $PACKAGE_VERSION."
            exit 1
          fi
          echo "✅ Binary reports version $BINARY_VERSION."

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: packages/mcp_dart_cli/dist/${{ matrix.asset }}
          if-no-files-found: error

  release-assets:
    name: Attach binaries to release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      statuses: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify release tag checkout
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            mcp_dart_cli-v*) ;;
            *)
              echo "❌ Invalid CLI release tag: $RELEASE_TAG"
              exit 1
              ;;
          esac
          TAG_REF=$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG")
          if [ -z "$TAG_REF" ]; then
            echo "❌ Remote CLI release tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          if [ -z "$TAG_COMMIT" ] || [ "$(git rev-parse HEAD)" != "$TAG_COMMIT" ]; then
            echo "❌ Checkout does not match $RELEASE_TAG."
            exit 1
          fi
          PACKAGE_VERSION=$(sed -n 's/^version: //p' packages/mcp_dart_cli/pubspec.yaml)
          EXPECTED_TAG="mcp_dart_cli-v$PACKAGE_VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "❌ Tag $RELEASE_TAG does not match CLI version $PACKAGE_VERSION."
            exit 1
          fi
          echo "✅ Attaching assets built from $RELEASE_TAG at $TAG_COMMIT."

      - name: Verify authorized existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_COMMIT=$(git rev-parse HEAD)
          CONTEXT="mcp_dart/release/mcp_dart_cli"
          STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GITHUB_REPOSITORY/commits/$TAG_COMMIT/status")
          STATE=$(jq -r --arg context "$CONTEXT" '
            [.statuses[] | select(.context == $context)]
            | if length == 0 then "absent" else max_by(.id).state end
          ' <<<"$STATUS")
          if [ "$STATE" != "success" ]; then
            echo "❌ Exact commit $TAG_COMMIT lacks successful $CONTEXT authorization."
            echo "   Create tags only through the Create Release workflow."
            exit 1
          fi

          PACKAGE_VERSION=$(sed -n \
            's/^version: //p' packages/mcp_dart_cli/pubspec.yaml)
          EXPECTED_PRERELEASE=false
          VERSION_WITHOUT_BUILD=${PACKAGE_VERSION%%+*}
          if [[ "$VERSION_WITHOUT_BUILD" == *-* ]]; then
            EXPECTED_PRERELEASE=true
          fi
          RELEASE_LOOKUP_ATTEMPTS=${CLI_RELEASE_LOOKUP_ATTEMPTS:-20}
          RELEASE_LOOKUP_INTERVAL_SECONDS=${CLI_RELEASE_LOOKUP_INTERVAL_SECONDS:-3}
          RELEASE=""
          for ((ATTEMPT = 1; ATTEMPT <= RELEASE_LOOKUP_ATTEMPTS; ATTEMPT++)); do
            if RELEASE=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
              2>/dev/null); then
              break
            fi
            if ((ATTEMPT < RELEASE_LOOKUP_ATTEMPTS)); then
              echo "⏳ Waiting for the authorized GitHub release."
              sleep "$RELEASE_LOOKUP_INTERVAL_SECONDS"
            fi
          done
          if [ -z "$RELEASE" ]; then
            echo "❌ Authorized GitHub release does not exist: $RELEASE_TAG."
            exit 1
          fi
          if ! jq -e \
            --arg tag "$RELEASE_TAG" \
            --argjson prerelease "$EXPECTED_PRERELEASE" \
            '.tag_name == $tag and .draft == false and
             .prerelease == $prerelease' <<<"$RELEASE" >/dev/null; then
            echo "❌ Existing release classification does not match $RELEASE_TAG."
            exit 1
          fi
          echo "✅ Existing release and exact-commit authorization verified."

      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Add bundled skill asset
        run: |
          cp packages/mcp_dart_cli/lib/src/skills/mcp-developer/SKILL.md dist/mcp-developer.SKILL.md

      - name: Attach binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          ASSETS=(dist/*)
          if ((${#ASSETS[@]} == 0)); then
            echo "❌ No CLI release assets were downloaded."
            exit 1
          fi
          # `gh release upload` cannot create a missing release, preserving the
          # authorization and classification checked above.
          gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
