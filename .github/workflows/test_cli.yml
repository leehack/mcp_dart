name: Run CLI Tests on PR

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'packages/mcp_dart_cli/**'
      - 'test/interop/python/**'
      - 'test/interop/ts/**'
      - 'tool/install.sh'
      - 'tool/install.ps1'
      - 'tool/validate_cli_publish.dart'
      - '.pubignore'
      - '.github/workflows/cli_binaries.yml'
      - '.github/workflows/publish.yml'
      - '.github/workflows/test_cli.yml'
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'packages/mcp_dart_cli/**'
      - 'test/interop/python/**'
      - 'test/interop/ts/**'
      - 'tool/install.sh'
      - 'tool/install.ps1'
      - 'tool/validate_cli_publish.dart'
      - '.pubignore'
      - '.github/workflows/cli_binaries.yml'
      - '.github/workflows/publish.yml'
      - '.github/workflows/test_cli.yml'

jobs:
  minimum-sdk:
    name: minimum SDK (Dart 3.12.0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp_dart_cli

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up minimum supported Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.12.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install TS interop dependencies
        working-directory: test/interop/ts
        run: npm ci

      - name: Build TS interop fixtures
        working-directory: test/interop/ts
        run: npm run build

      - name: Install Python interop dependencies
        working-directory: .
        run: python -m pip install -r test/interop/python/requirements.txt

      - name: Install dependencies
        run: dart pub get

      - name: Analyze at minimum SDK
        run: dart analyze

      - name: Compile and smoke-test CLI
        run: |
          mkdir -p .dart_tool/minimum-sdk
          dart compile exe bin/mcp_dart.dart -o .dart_tool/minimum-sdk/mcp_dart
          .dart_tool/minimum-sdk/mcp_dart --version

      - name: Run minimum-SDK test suite
        run: dart test

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp_dart_cli

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install TS interop dependencies
        working-directory: test/interop/ts
        run: npm ci

      - name: Build TS interop fixtures
        working-directory: test/interop/ts
        run: npm run build

      - name: Install Python interop dependencies
        working-directory: .
        run: python -m pip install -r test/interop/python/requirements.txt

      - name: Install dependencies
        run: dart pub get

      - name: Validate standalone installers
        working-directory: .
        run: |
          sh -n tool/install.sh
          pwsh -NoLogo -NoProfile -Command "\$ErrorActionPreference = 'Stop'; \$errors = \$null; [void][System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw tool/install.ps1), [ref]\$errors); if (\$errors) { throw \$errors[0] }"

      - name: Analyze project
        run: dart analyze

      - name: Run tests with coverage
        run: |
          dart pub global activate coverage 1.15.1
          dart pub global run coverage:test_with_coverage

      - name: Run MCP spec conformance gate
        run: dart run bin/mcp_dart.dart conformance --suite all --json

      - name: Validate exported CLI package for publishing
        working-directory: .
        run: dart run tool/validate_cli_publish.dart

      - name: Run pana (package analysis)
        run: |
          dart pub global activate pana 0.23.14
          set +e
          dart pub global run pana --json --no-warning --exit-code-threshold 0 > pana_output.json
          PANA_EXIT=$?
          set -e
          # Filter out log lines and extract scores from the summary
          RESULT=$(grep -v '^{"logName"' pana_output.json || true)
          SCORE=$(echo "$RESULT" | grep -o '"grantedPoints": *[0-9]*' | tail -1 | grep -o '[0-9]*$' || true)
          MAX_POINTS=$(echo "$RESULT" | grep -o '"maxPoints": *[0-9]*' | tail -1 | grep -o '[0-9]*$' || true)
          echo "Pana score: $SCORE/$MAX_POINTS"
          # We might want to enforce a threshold, e.g. 130 or 140 initially.
          # For now, let's strict check if it matches expectation or just warn.
          # Given the previous task aimed for 160/160, let's keep it strict but maybe allow slight dev.
          # For this initial workflow file, I will fail if not max points to maintain quality.
          if [ "$PANA_EXIT" -ne 0 ] || [ "$SCORE" != "$MAX_POINTS" ]; then
            if grep -q 'depends on mcp_dart .*which doesn.*t match any versions' pana_output.json ||
              { { grep -q '^dependency_overrides:' pubspec.yaml ||
                  grep -q '^dependency_overrides:' pubspec_overrides.yaml 2>/dev/null; } &&
                grep -Eq 'UNDEFINED_(NAMED_PARAMETER|FUNCTION|GETTER|METHOD|CLASS)|MISSING_REQUIRED_ARGUMENT' pana_output.json; }; then
              echo "::warning::Skipping strict CLI pana score because this PR prepares the CLI against unpublished local mcp_dart APIs. Publish mcp_dart first, then rerun pana before publishing mcp_dart_cli."
              exit 0
            fi
            echo "pana exited with code $PANA_EXIT."
            echo "Error: Package score is $SCORE/$MAX_POINTS."
            echo ""
            echo "Detailed report:"
            dart pub global run pana --no-warning
            exit 1
          fi
          echo "✓ Package achieves perfect score"

      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/mcp_dart_cli/coverage/lcov.info
          flags: cli
          name: codecov-cli
          fail_ci_if_error: true
