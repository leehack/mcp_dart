name: Create Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - mcp_dart
          - mcp_dart_cli

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create tags and releases
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.RELEASE_PAT }}
      
      - name: Set package configuration
        id: set-config
        run: |
          if [ "${{ inputs.package }}" = "mcp_dart" ]; then
            {
              echo "working_directory=."
              echo "tag_prefix=v"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "working_directory=packages/mcp_dart_cli"
              echo "tag_prefix=mcp_dart_cli-v"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Get version from pubspec.yaml
        id: get-version
        working-directory: ${{ steps.set-config.outputs.working_directory }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Package: ${{ inputs.package }}"
          echo "📦 Detected version: $VERSION"

      - name: Determine release type
        id: release-type
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            {
              echo "prerelease=true"
              echo "make_latest=false"
            } >> "$GITHUB_OUTPUT"
            echo "📦 Release type: prerelease"
          else
            {
              echo "prerelease=false"
              echo "make_latest=true"
            } >> "$GITHUB_OUTPUT"
            echo "📦 Release type: stable"
          fi

      - name: Verify stable release source
        if: steps.release-type.outputs.prerelease == 'false'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_TYPE" != "branch" ] || [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "❌ Stable releases must be dispatched from $DEFAULT_BRANCH."
            exit 1
          fi
          DEFAULT_SHA=$(git ls-remote origin "refs/heads/$DEFAULT_BRANCH" | awk 'NR == 1 { print $1 }')
          if [ -z "$DEFAULT_SHA" ]; then
            echo "❌ Could not resolve origin/$DEFAULT_BRANCH."
            exit 1
          fi
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$HEAD_SHA" != "$DEFAULT_SHA" ]; then
            TAG="${{ steps.set-config.outputs.tag_prefix }}${{ steps.get-version.outputs.version }}"
            TAG_REF=$(git ls-remote --tags origin "refs/tags/$TAG")
            if [ -z "$TAG_REF" ]; then
              echo "❌ Stable releases must use the latest origin/$DEFAULT_BRANCH commit."
              exit 1
            fi
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$HEAD_SHA" != "$TAG_COMMIT" ]; then
              echo "❌ Stale release source does not match existing tag $TAG."
              exit 1
            fi
            echo "✅ Stable release recovery matches existing tag $TAG."
          else
            echo "✅ Stable release source matches origin/$DEFAULT_BRANCH."
          fi

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Prepare release candidate
        id: publish-dir
        run: |
          if [ "${{ inputs.package }}" = "mcp_dart_cli" ]; then
            PUBLISH_ROOT="$RUNNER_TEMP/mcp_dart_publish"
            rm -rf "$PUBLISH_ROOT"
            mkdir -p "$PUBLISH_ROOT"
            rsync -a --exclude .git --exclude .dart_tool --exclude pubspec.lock ./ "$PUBLISH_ROOT/"
            rm -f "$PUBLISH_ROOT/packages/mcp_dart_cli/pubspec_overrides.yaml"
            echo "working_directory=$PUBLISH_ROOT/packages/mcp_dart_cli" >> "$GITHUB_OUTPUT"
          else
            echo "working_directory=." >> "$GITHUB_OUTPUT"
          fi

      - name: Install release dependencies
        working-directory: ${{ steps.publish-dir.outputs.working_directory }}
        run: dart pub get

      - name: Validate release before creating tag
        working-directory: ${{ steps.publish-dir.outputs.working_directory }}
        run: dart pub publish --dry-run

      - name: Resolve release tag
        id: create-tag
        run: |
          TAG="${{ steps.set-config.outputs.tag_prefix }}${{ steps.get-version.outputs.version }}"
          TAG_REF=$(git ls-remote --tags origin "refs/tags/$TAG")
          if [ -n "$TAG_REF" ]; then
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$(git rev-parse HEAD)" != "$TAG_COMMIT" ]; then
              echo "❌ Existing tag $TAG points to $TAG_COMMIT, not $(git rev-parse HEAD)."
              echo "   Never move or recreate a published tag; bump the version instead."
              exit 1
            fi
            echo "✅ Reusing existing tag $TAG at $TAG_COMMIT."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${{ inputs.package }} ${{ steps.get-version.outputs.version }}"
            git push origin "$TAG"
            echo "🏷️ Created and pushed tag: $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.create-tag.outputs.tag }}
          name: ${{ inputs.package }} ${{ steps.get-version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          make_latest: ${{ steps.release-type.outputs.make_latest }}
          draft: false
