name: Create Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - mcp_dart
          - mcp_dart_cli

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create tags and releases
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.RELEASE_PAT }}
      
      - name: Set package configuration
        id: set-config
        run: |
          if [ "${{ inputs.package }}" = "mcp_dart" ]; then
            echo "working_directory=." >> "$GITHUB_OUTPUT"
            echo "tag_prefix=v" >> "$GITHUB_OUTPUT"
          else
            echo "working_directory=packages/mcp_dart_cli" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=mcp_dart_cli-v" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version from pubspec.yaml
        id: get-version
        working-directory: ${{ steps.set-config.outputs.working_directory }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Package: ${{ inputs.package }}"
          echo "📦 Detected version: $VERSION"

      - name: Determine release type
        id: release-type
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            echo "📦 Release type: prerelease"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
            echo "📦 Release type: stable"
          fi

      - name: Verify stable release source
        if: steps.release-type.outputs.prerelease == 'false'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_TYPE" != "branch" ] || [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "❌ Stable releases must be dispatched from $DEFAULT_BRANCH."
            exit 1
          fi
          DEFAULT_SHA=$(git ls-remote origin "refs/heads/$DEFAULT_BRANCH" | awk 'NR == 1 { print $1 }')
          if [ -z "$DEFAULT_SHA" ]; then
            echo "❌ Could not resolve origin/$DEFAULT_BRANCH."
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$DEFAULT_SHA" ]; then
            echo "❌ Stable releases must use the latest origin/$DEFAULT_BRANCH commit."
            exit 1
          fi
          echo "✅ Stable release source matches origin/$DEFAULT_BRANCH."

      - name: Check if tag already exists
        run: |
          TAG="${{ steps.set-config.outputs.tag_prefix }}${{ steps.get-version.outputs.version }}"
          TAG_SHA=$(git ls-remote --tags origin "refs/tags/$TAG")
          if [ -n "$TAG_SHA" ]; then
            echo "❌ Error: Tag $TAG already exists!"
            echo "   This version has already been released."
            echo "   Please bump the version in pubspec.yaml first."
            exit 1
          fi
          echo "✅ Tag $TAG does not exist, proceeding..."

      - name: Create and push tag
        id: create-tag
        run: |
          TAG="${{ steps.set-config.outputs.tag_prefix }}${{ steps.get-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${{ inputs.package }} ${{ steps.get-version.outputs.version }}"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "🏷️ Created and pushed tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.create-tag.outputs.tag }}
          name: ${{ inputs.package }} ${{ steps.get-version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          make_latest: ${{ steps.release-type.outputs.make_latest }}
          draft: false
