name: mcp_dart
description: Dart Implementation of Model Context Protocol (MCP) SDK.
version: 1.3.1
repository: https://github.com/leehack/mcp_dart
publish_to: none

environment:
  sdk: >=3.9.0 <4.0.0

dependencies:
  http: ^1.4.0
  # Required for handleShelfRequest() in StreamableHTTPServerTransport —
  # the method accepts shelf Request and returns shelf Response, and internally
  # constructs ShelfHttpAdapter. Used by isomorphic_server's request router.
  shelf: ^1.4.0

dev_dependencies:
  lints: ^6.0.0
  path: ^1.9.1
  test: ^1.24.0
