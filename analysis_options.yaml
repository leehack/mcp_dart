include: package:lints/recommended.yaml

analyzer:
  exclude:
    - packages/templates/simple/**
    # Standalone packages resolve their own dependencies from their nested
    # pubspecs. Analyze them from their package roots instead of the root
    # package analyzer context.
    - example/anthropic-client/**
    - example/fetch-server/**
    - example/flutter_http_client/**
    - example/gemini-client/**
    - example/jaspr-client/**
    - packages/mcp_dart_cli/**
  language:
    # strict-casts: true
    # strict-inference: true
    # strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - annotate_overrides
    - avoid_print
    - avoid_void_async
    - cancel_subscriptions
    # - close_sinks
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    - prefer_const_constructors
    - prefer_final_locals
    - test_types_in_equals
    - throw_in_finally
    # - unawaited_futures
    - unnecessary_statements
    - require_trailing_commas
